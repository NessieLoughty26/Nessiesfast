<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Nessie's Fast</title>
<link id="ati" rel="apple-touch-icon" href=""/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Fast"/>
<script>(function(){
  var c=document.createElement('canvas');c.width=c.height=180;
  var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,180,180);
  g.addColorStop(0,'#ff9966');g.addColorStop(1,'#ffcc66');
  x.fillStyle=g;x.beginPath();x.roundRect(0,0,180,180,36);x.fill();
  x.font='108px serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText('\u{1F34B}',90,96);
  document.getElementById('ati').href=c.toDataURL('image/png');
})();</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #fffaf5;
  --bg2:     #fff4e8;
  --bg3:     #ffecd5;
  --card:    #ffffff;
  --card2:   #fff8f0;
  --peach:   #ff7c4d;
  --peach2:  #ff9966;
  --lemon:   #f5c842;
  --lemon2:  #ffd966;
  --coral:   #ff5533;
  --mint:    #4ecba0;
  --mint2:   #7ddcba;
  --text:    #2d1f0e;
  --text2:   #8a6040;
  --text3:   #c49878;
  --border:  rgba(255,124,77,0.18);
  --border2: rgba(255,124,77,0.09);
  --shadow:  rgba(255,100,50,0.12);
  --font-d:  'Playfair Display', Georgia, serif;
  --font-b:  'Plus Jakarta Sans', system-ui, sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-b); font-size:15px; }

/* zesty background pattern */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: radial-gradient(circle, rgba(255,124,77,0.07) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:rgba(255,124,77,0.25); border-radius:2px; }

#app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; z-index:1; padding-bottom:82px; }

header {
  padding:16px 20px 10px; text-align:center;
  background:linear-gradient(180deg, #fff4e8 0%, rgba(255,250,245,0) 100%);
  position:sticky; top:0; z-index:100;
}
header h1 { font-family:var(--font-d); font-size:23px; font-weight:400; font-style:italic; color:var(--peach); letter-spacing:0.02em; }
header p  { font-size:9px; color:var(--text3); letter-spacing:0.2em; text-transform:uppercase; margin-top:3px; }

nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:var(--card);
  border-top:1px solid var(--border); display:flex; z-index:200;
  box-shadow:0 -4px 20px rgba(255,100,50,0.08);
}
nav button { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 2px 6px; background:none; border:none; cursor:pointer; color:var(--text3); font-family:var(--font-b); transition:color 0.2s; }
nav button .icon { font-size:18px; }
nav button .lbl  { font-size:9px; margin-top:2px; letter-spacing:0.04em; font-weight:500; }
nav button.active { color:var(--peach); border-top:2px solid var(--peach); }

main { padding:0 14px 16px; }
.col { display:flex; flex-direction:column; gap:12px; }
.tab-panel { display:none; }

.card {
  background:var(--card); border-radius:20px;
  border:1px solid var(--border2);
  box-shadow:0 4px 20px var(--shadow);
  padding:16px 18px;
}
.card-title { font-family:var(--font-d); font-size:13px; font-style:italic; color:var(--peach); margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border2); }

input, select {
  background:var(--bg2); border:1.5px solid var(--border); border-radius:12px;
  padding:10px 14px; font-family:var(--font-b); font-size:14px; color:var(--text);
  outline:none; width:100%; transition:border-color 0.2s; font-weight:400;
}
input[type="time"] { width:auto; min-width:0; max-width:160px; }
input:focus, select:focus { border-color:var(--peach2); }
select option { background:#fff; }

.btn {
  background:linear-gradient(135deg, var(--peach), var(--peach2));
  color:#fff; border:none; border-radius:14px;
  padding:13px 20px; font-family:var(--font-b); font-size:15px; font-weight:600;
  cursor:pointer; width:100%; transition:opacity 0.2s, transform 0.1s;
  box-shadow:0 4px 16px rgba(255,100,50,0.35); letter-spacing:0.01em;
}
.btn:active { transform:scale(0.98); }
.btn-mint {
  background:linear-gradient(135deg, var(--mint), var(--mint2));
  box-shadow:0 4px 16px rgba(78,203,160,0.3);
}
.btn-outline {
  background:none; color:var(--peach); border:2px solid rgba(255,124,77,0.3);
  border-radius:14px; padding:11px 20px; font-family:var(--font-b); font-size:14px;
  font-weight:500; cursor:pointer; width:100%; transition:border-color 0.2s;
}
.btn-outline:hover { border-color:var(--peach); }
.btn-sm { padding:8px 16px; font-size:13px; border-radius:10px; width:auto; box-shadow:none; }
.flex-between { display:flex; justify-content:space-between; align-items:center; }
.form-row { margin-bottom:13px; }
.form-label { display:block; font-size:10px; color:var(--text3); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; font-weight:600; }

#toast {
  position:fixed; top:74px; left:50%; transform:translateX(-50%) translateY(-8px);
  background:var(--peach); color:#fff;
  padding:10px 24px; border-radius:40px; font-size:13px; z-index:999;
  opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap;
  font-family:var(--font-d); font-style:italic; font-weight:400;
  box-shadow:0 4px 16px rgba(255,100,50,0.35);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.modal-bg { position:fixed; inset:0; background:rgba(45,30,14,0.45); z-index:500; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal { background:var(--card); border-radius:24px 24px 0 0; border-top:1px solid var(--border); padding:20px 18px 40px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; transform:translateY(30px); transition:transform 0.25s; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-family:var(--font-d); font-size:24px; font-style:italic; color:var(--peach); margin-bottom:18px; }

.empty { text-align:center; padding:40px 16px; }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty p { font-size:14px; font-style:italic; font-family:var(--font-d); color:var(--text3); line-height:1.7; }

/* ── RING ── */
.ring-wrap { display:flex; align-items:center; justify-content:center; padding:6px 0; position:relative; }
.ring-svg { transform:rotate(-90deg); filter:drop-shadow(0 0 18px rgba(255,124,77,0.3)); }
.ring-track { fill:none; stroke:#ffecd5; stroke-width:12; }
.ring-fill  { fill:none; stroke-width:12; stroke-linecap:round; transition:stroke-dashoffset 0.9s cubic-bezier(.4,0,.2,1); }
.ring-center { position:absolute; text-align:center; }
.ring-time  { font-family:var(--font-d); font-size:46px; font-weight:400; color:var(--text); letter-spacing:-0.02em; line-height:1; }
.ring-label { font-size:10px; color:var(--text3); letter-spacing:0.16em; text-transform:uppercase; margin-top:5px; font-weight:500; }

/* lock */
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
.lock-icon { font-size:30px; display:block; text-align:center; margin-bottom:6px; }
.lock-icon.popped { animation:pop 0.55s ease; }

/* phase */
.phase-bar { height:6px; background:var(--bg3); border-radius:99px; overflow:hidden; margin:6px 0; }
.phase-fill { height:100%; border-radius:99px; transition:width 0.9s ease; }

/* quote */
.quote-block {
  background:linear-gradient(135deg, #fff8f0, #fff3e5);
  border:1px solid rgba(255,200,150,0.4);
  border-radius:16px; padding:16px 18px;
  position:relative; overflow:hidden;
}
.quote-block::before { content:'\201C'; position:absolute; top:-4px; left:12px; font-size:60px; color:rgba(255,124,77,0.12); font-family:Georgia; line-height:1; pointer-events:none; }
.quote-text { font-family:var(--font-d); font-size:15px; font-style:italic; color:var(--text); line-height:1.75; padding-left:6px; }
.quote-attr { font-size:10px; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-top:6px; padding-left:6px; }

/* stat chips */
.stat-chip { background:var(--bg2); border-radius:14px; padding:12px 8px; text-align:center; border:1px solid var(--border2); }
.stat-val { font-family:var(--font-d); font-size:20px; color:var(--peach); line-height:1.1; margin-top:4px; }
.stat-lbl { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-top:3px; font-weight:500; }

/* fast row */
.fast-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border2); }
.fast-row:last-child { border-bottom:none; }
.badge { display:inline-block; font-size:10px; padding:3px 10px; border-radius:20px; font-weight:600; letter-spacing:0.03em; }
.badge-ok   { background:rgba(78,203,160,0.15); color:#2a9e78; }
.badge-meh  { background:rgba(255,180,100,0.2);  color:#c07830; }

/* dots */
.dot-row { display:flex; gap:6px; flex-wrap:wrap; }
.dot { width:12px; height:12px; border-radius:50%; background:var(--bg3); border:1.5px solid var(--border); transition:all 0.3s; }
.dot.done  { background:linear-gradient(135deg,var(--peach),var(--lemon)); border-color:var(--peach); }
.dot.today { border-color:var(--peach); box-shadow:0 0 6px rgba(255,124,77,0.4); }
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>
  <header>
    <h1>Nessie's Fast</h1>
    <p id="hsub">fresh &middot; light &middot; strong</p>
  </header>
  <main>
    <div id="tab-fast"      class="tab-panel"></div>
    <div id="tab-history"   class="tab-panel" style="display:none"></div>
    <div id="tab-settings-f" class="tab-panel" style="display:none"></div>
  </main>
  <nav>
    <button class="active" data-tab="fast"         onclick="switchTab('fast')"><span class="icon">🍋</span><span class="lbl">Fast</span></button>
    <button data-tab="history"     onclick="switchTab('history')"><span class="icon">✨</span><span class="lbl">History</span></button>
    <button data-tab="settings-f"  onclick="switchTab('settings-f')"><span class="icon">⚙️</span><span class="lbl">Settings</span></button>
  </nav>
</div>
<div id="modal-bg" class="modal-bg" onclick="closeModal(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modal-content"></div></div>
</div>
<script>
const DB={
  async get(k,fb){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):fb;}catch{return fb;}},
  async set(k,v){try{await window.storage.set(k,JSON.stringify(v));}catch{}}
};
const S={};
let ticker=null;

async function init(){
  S.cfg     = await DB.get('fast_cfg',    {hours:18,eatHours:6,startHour:18,startMin:0});
  S.active  = await DB.get('fast_active', null);
  S.history = await DB.get('fast_history',[]);
  renderAll();
  if(S.active) startTicker();
}
function renderAll(){renderFast();renderHistory();renderSettingsF();}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}
function switchTab(tab){
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
}
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-bg').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');}
let _pd=null;
function confirmDo(msg,fn){
  _pd=fn;
  openModal(`<div style="text-align:center;padding:8px 0 4px">
    <div style="font-size:32px;margin-bottom:12px">🍊</div>
    <div style="font-family:var(--font-d);font-size:20px;font-style:italic;color:var(--peach);margin-bottom:8px">Are you sure?</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.65">${msg}</div>
    <div style="display:flex;gap:10px">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="if(_pd){_pd();_pd=null;}closeModal()">Confirm</button>
    </div></div>`);
}

function fmt2(n){return String(n).padStart(2,'0');}
function fmtDur(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h+'h '+fmt2(m)+'m';}
function todayStr(){return new Date().toISOString().slice(0,10);}

// ── QUOTES — rotate every 5 min, guaranteed different each phase ──────────────
const QUOTES=[
  {p:0,t:"You started. That is already more than most people will do today.",a:""},
  {p:0,t:"Every sip of water is your body saying thank you.",a:""},
  {p:0,t:"The first hours are the hardest. You are almost through them.",a:""},
  {p:0,t:"Discipline is just love for your future self, dressed up differently.",a:""},
  {p:0,t:"Your body is already getting to work. Trust the process.",a:""},
  {p:0,t:"She decided to start. That was the hardest part.",a:""},
  {p:0,t:"Every hour you hold is a vote for the woman you are becoming.",a:""},
  {p:1,t:"Halfway there. Right now your body is burning fat for fuel.",a:""},
  {p:1,t:"This is where most people stop. Not you, though.",a:""},
  {p:1,t:"The body achieves what the mind believes.",a:"Napoleon Hill"},
  {p:1,t:"You are not missing out. You are investing in yourself.",a:""},
  {p:1,t:"She is not waiting to feel ready. She is doing it anyway.",a:""},
  {p:1,t:"A little progress each day adds up to big results.",a:""},
  {p:1,t:"You are stronger than your cravings and you know it.",a:""},
  {p:2,t:"Almost there. Your cells are literally repairing themselves right now.",a:""},
  {p:2,t:"This is peak fat-burning territory. Stay the course.",a:""},
  {p:2,t:"The woman who does not require validation is the most powerful woman in the room.",a:"Mohadesa Najumi"},
  {p:2,t:"You have done hard things before. This is just another one.",a:""},
  {p:2,t:"Strong women are not just born. They are built, one choice at a time.",a:""},
  {p:2,t:"Look how far you have already come.",a:""},
  {p:3,t:"Minutes away. You are genuinely incredible.",a:""},
  {p:3,t:"Finish how you started — with intention.",a:""},
  {p:3,t:"Your eating window is almost here. You earned every bite.",a:""},
  {p:3,t:"Last stretch. Do not stop now. You are so close.",a:""},
  {p:3,t:"The final hour is where legends are made.",a:""},
  {p:4,t:"Fast complete. Go eat something delicious — you earned it. \uD83C\uDF4A",a:""},
  {p:4,t:"Done. Every completed fast makes the next one easier.",a:""},
  {p:4,t:"You did it. Again. This is who you are now.",a:""},
  {p:4,t:"Completed. Your future self thanks you.",a:""},
];
// rotate every 5 min using a seed that changes with time but also varies by phase
function getQuote(pct){
  const phase=pct<25?0:pct<60?1:pct<90?2:pct<100?3:4;
  const pool=QUOTES.filter(q=>q.p===phase);
  const seed=Math.floor(Date.now()/300000); // changes every 5 min
  return pool[seed%pool.length];
}

// ── SCIENCE FACTS — shown on the fast screen, rotates daily ──────────────────
const FACTS=[
  {icon:"\uD83D\uDD25",fact:"After 12–16 hours of fasting, your body switches to burning fat as its primary fuel source."},
  {icon:"\uD83E\uDDE0",fact:"Fasting boosts BDNF, a brain protein that improves focus, memory and mood. Your mind is getting sharper right now."},
  {icon:"\u2728",fact:"Autophagy — your body's cellular self-cleaning process — kicks in around hour 16–18. You are literally renewing yourself."},
  {icon:"\uD83D\uDCC9",fact:"Intermittent fasting can reduce insulin levels by 20–31%, making fat storage much harder."},
  {icon:"\uD83D\uDCAA",fact:"Studies show 18:6 fasting can preserve muscle mass while reducing body fat — unlike calorie restriction alone."},
  {icon:"\uD83D\uDC9A",fact:"Fasting lowers inflammation markers in the body. Less inflammation = clearer skin, less bloating, better energy."},
  {icon:"\uD83D\uDE34",fact:"Human growth hormone can increase by up to 5x during a fast, supporting fat burning and muscle repair."},
  {icon:"\u23F0",fact:"Your hunger hormone (ghrelin) actually peaks and then drops — if you push through the hunger, it passes within 20 minutes."},
  {icon:"\uD83C\uDF4A",fact:"Breaking your fast with protein and healthy fats first helps stabilise blood sugar and prevents energy crashes."},
  {icon:"\uD83E\uDDA0",fact:"Fasting gives your digestive system a proper rest, allowing gut repair and reducing bloating over time."},
];

// ── PHASES ───────────────────────────────────────────────────────────────────
function getPhase(pct){
  if(pct<15)  return{name:'Digesting',    color:'#f5c842',grad:'#f5c842,#ffd966',desc:'Processing your last meal'};
  if(pct<35)  return{name:'Transitioning',color:'#ffaa44',grad:'#ffaa44,#ffc866',desc:'Glycogen running low'};
  if(pct<60)  return{name:'Fat burning',  color:'#ff7c4d',grad:'#ff7c4d,#ff9966',desc:'Ketones rising — this is the good stuff'};
  if(pct<85)  return{name:'Deep ketosis', color:'#ff5533',grad:'#ff5533,#ff7755',desc:'Peak fat burn mode'};
  return             {name:'Autophagy',   color:'#4ecba0',grad:'#4ecba0,#7ddcba',desc:'Cellular repair — you are glowing'};
}

// ── RENDER FAST ───────────────────────────────────────────────────────────────
function renderFast(){
  const el=document.getElementById('tab-fast');
  if(!S.active){
    const streak=calcStreak(), last=S.history[0];
    el.innerHTML=`<div class="col" style="padding-top:10px">
      <div style="text-align:center;padding:24px 0 12px">
        <div style="font-size:72px;margin-bottom:14px">🍋</div>
        <div style="font-family:var(--font-d);font-size:28px;font-weight:400;font-style:italic;color:var(--text);margin-bottom:6px">Let's fast, queen.</div>
        <div style="font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase">${S.cfg.hours}h fast &middot; ${S.cfg.eatHours}h eating window</div>
      </div>
      ${streak>0?`<div class="card" style="text-align:center;padding:16px;background:linear-gradient(135deg,#fff8f0,#fff3e5)">
        <div style="font-size:10px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:8px">You're on a streak!</div>
        <div style="font-family:var(--font-d);font-size:48px;color:var(--peach);line-height:1">${streak} <span style="font-size:28px">\uD83D\uDD25</span></div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">day${streak!==1?'s':''} in a row — keep it going!</div>
      </div>`:''}
      <div class="card">
        <div class="card-title">When did your fast start?</div>
        <div class="form-row">
          <label class="form-label">Start time</label>
          <input type="time" id="start-time" value="${fmt2(S.cfg.startHour)}:${fmt2(S.cfg.startMin)}" oninput="updatePreview()"/>
        </div>
        <div style="background:var(--bg2);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.8">
          \uD83C\uDF4A Eating window opens at <span id="eat-prev" style="color:var(--peach);font-family:var(--font-d);font-size:15px;font-weight:bold"></span>
        </div>
        <button class="btn" style="padding:14px;font-size:16px" onclick="startFast()">Start my fast \uD83C\uDF4B</button>
      </div>
      ${last?`<div class="card">
        <div class="card-title">Last fast</div>
        <div class="flex-between">
          <div><div style="font-size:14px;color:var(--text)">${last.date}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDur(last.duration)}</div></div>
          <span class="badge ${last.completed?'badge-ok':'badge-meh'}">${last.completed?'Complete \u2713':'Broke early'}</span>
        </div>
      </div>`:''}
    </div>`;
    updatePreview();
    return;
  }

  const now=Date.now(), startedAt=new Date(S.active.startedAt).getTime();
  const totalMs=S.cfg.hours*3600000, elapsed=now-startedAt;
  const remaining=Math.max(0,totalMs-elapsed), pct=Math.min(100,(elapsed/totalMs)*100);
  const done=pct>=100;
  const rh=Math.floor(remaining/3600000), rm=Math.floor((remaining%3600000)/60000), rs=Math.floor((remaining%60000)/1000);
  const phase=getPhase(pct), quote=getQuote(pct);
  const R=100,cx=110,cy=110,circ=2*Math.PI*R,offset=circ*(1-pct/100);
  const ringColor=done?'#4ecba0':`hsl(${20+pct*0.8},${85+pct*0.1}%,${58-pct*0.12}%)`;

  el.innerHTML=`<div class="col" style="padding-top:4px">
    <div class="ring-wrap">
      <svg class="ring-svg" width="224" height="224" viewBox="0 0 220 220">
        <circle class="ring-track" cx="${cx}" cy="${cy}" r="${R}"/>
        <circle class="ring-fill" cx="${cx}" cy="${cy}" r="${R}"
          stroke="${ringColor}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
      </svg>
      <div class="ring-center">
        <span class="lock-icon ${done?'popped':''}">${done?'\uD83D\uDD13':'\uD83D\uDD12'}</span>
        ${done
          ?`<div class="ring-time" style="font-size:28px;color:var(--mint)">Done! \uD83C\uDF4A</div><div class="ring-label">eating window open</div>`
          :`<div class="ring-time">${fmt2(rh)}:${fmt2(rm)}<span style="font-size:20px">:${fmt2(rs)}</span></div><div class="ring-label">until eating window</div>`}
      </div>
    </div>

    <div class="card" style="padding:12px 16px">
      <div class="flex-between" style="margin-bottom:5px">
        <span style="font-size:12px;font-weight:600;color:${phase.color}">${phase.name}</span>
        <span style="font-size:12px;color:var(--text3);font-weight:500">${Math.round(pct)}%</span>
      </div>
      <div class="phase-bar"><div class="phase-fill" style="width:${pct}%;background:linear-gradient(90deg,${phase.grad})"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:5px;font-weight:400">${phase.desc}</div>
    </div>

    <div class="quote-block">
      <div class="quote-text">${quote.t}</div>
      ${quote.a?`<div class="quote-attr">&mdash; ${quote.a}</div>`:''}
    </div>

    ${(()=>{const f=FACTS[new Date().getDate()%FACTS.length];return `<div style="background:linear-gradient(135deg,#f0fbf7,#e8f8f3);border:1px solid rgba(78,203,160,0.25);border-radius:16px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start">
      <span style="font-size:24px;flex-shrink:0">${f.icon}</span>
      <div>
        <div style="font-size:10px;color:var(--mint);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Did you know?</div>
        <div style="font-size:13px;color:#2a6a52;line-height:1.6">${f.fact}</div>
      </div>
    </div>`;})()}

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="stat-chip">
        <div style="font-size:16px">\u23F1\uFE0F</div>
        <div class="stat-val">${Math.floor(elapsed/3600000)}h${fmt2(Math.floor((elapsed%3600000)/60000))}</div>
        <div class="stat-lbl">elapsed</div>
      </div>
      <div class="stat-chip">
        <div style="font-size:16px">\uD83C\uDFC6</div>
        <div class="stat-val">${S.cfg.hours}h</div>
        <div class="stat-lbl">goal</div>
      </div>
      <div class="stat-chip">
        <div style="font-size:16px">\uD83D\uDD25</div>
        <div class="stat-val">${calcStreak()}</div>
        <div class="stat-lbl">streak</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn ${done?'btn-mint':''}" onclick="completeFast()">${done?'\uD83C\uDF4A Complete!':'Complete early'}</button>
      <button class="btn-outline" onclick="breakFast()">Break fast</button>
    </div>
  </div>`;
}

function updatePreview(){
  const el=document.getElementById('start-time');
  if(!el)return;
  const [h,m]=el.value.split(':').map(Number);
  const eat=new Date(); eat.setHours(h+S.cfg.hours,m,0,0);
  const p=document.getElementById('eat-prev');
  if(p)p.textContent=eat.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function startTicker(){
  if(ticker)clearInterval(ticker);
  ticker=setInterval(()=>{if(document.getElementById('tab-fast').style.display!=='none')renderFast();},1000);
}
function stopTicker(){if(ticker){clearInterval(ticker);ticker=null;}}

async function startFast(){
  const el=document.getElementById('start-time');
  const [h,m]=el.value.split(':').map(Number);
  const now=new Date(), start=new Date(now);
  start.setHours(h,m,0,0);
  if(start>now)start.setDate(start.getDate()-1);
  S.cfg.startHour=h;S.cfg.startMin=m;
  await DB.set('fast_cfg',S.cfg);
  S.active={startedAt:start.toISOString()};
  await DB.set('fast_active',S.active);
  startTicker();renderFast();toast('Fast started! You\'ve got this \uD83C\uDF4B');
}

async function completeFast(){
  const now=Date.now(),startedAt=new Date(S.active.startedAt).getTime(),duration=now-startedAt;
  const completed=duration>=S.cfg.hours*3600000*0.9;
  S.history.unshift({
    date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
    startedAt:S.active.startedAt,endedAt:new Date().toISOString(),
    duration,completed,hours:S.cfg.hours
  });
  if(S.history.length>90)S.history=S.history.slice(0,90);
  await DB.set('fast_history',S.history);
  S.active=null;await DB.set('fast_active',null);
  stopTicker();renderAll();
  toast(completed?'\uD83C\uDF4A Fast complete! Go eat something amazing.':'Fast saved \u2726');
}

async function breakFast(){
  confirmDo('End your fast now? Your progress will still be saved in history.',async()=>{
    const now=Date.now(),startedAt=new Date(S.active.startedAt).getTime(),duration=now-startedAt;
    S.history.unshift({
      date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
      startedAt:S.active.startedAt,endedAt:new Date().toISOString(),
      duration,completed:false,hours:S.cfg.hours
    });
    await DB.set('fast_history',S.history);
    S.active=null;await DB.set('fast_active',null);
    stopTicker();renderAll();toast('Fast ended \u2726 Tomorrow is a new day!');
  });
}

function calcStreak(){
  if(!S.history.length)return 0;
  const dates=[...new Set(S.history.filter(f=>f.completed).map(f=>f.endedAt?.slice(0,10)))].sort().reverse();
  if(!dates.length)return 0;
  const today=new Date(todayStr()+'T12:00:00'),d=new Date(dates[0]+'T12:00:00');
  const diff=Math.floor((today-d)/86400000);
  if(diff>1)return 0;
  let s=0;
  for(let i=0;i<dates.length;i++){
    const exp=new Date(today);exp.setDate(exp.getDate()-(diff+i));
    if(dates[i]===exp.toISOString().slice(0,10))s++;else break;
  }
  return s;
}

function renderHistory(){
  const el=document.getElementById('tab-history');
  const streak=calcStreak(),total=S.history.filter(f=>f.completed).length;
  const avg=S.history.length?S.history.reduce((a,f)=>a+f.duration,0)/S.history.length:0;
  const dots=[];
  for(let i=13;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const done=S.history.some(f=>f.completed&&f.endedAt?.slice(0,10)===ds);
    dots.push(`<div class="dot ${done?'done':''} ${i===0&&!done?'today':''}" title="${ds}"></div>`);
  }
  let html=`<div class="col" style="padding-top:10px">
    <div style="font-family:var(--font-d);font-size:22px;font-style:italic;color:var(--peach);padding:0 2px">Your progress</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${[['\uD83D\uDD25',streak,'Streak'],['\u2705',total,'Complete'],['\u23F1\uFE0F',avg?fmtDur(avg):'—','Avg fast']].map(([e,n,l])=>`
        <div class="stat-chip">
          <div style="font-size:20px">${e}</div>
          <div class="stat-val">${n}</div>
          <div class="stat-lbl">${l}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Last 14 days</div>
      <div class="dot-row">${dots.join('')}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">\uD83D\uDFE0 = completed fast</div>
    </div>`;
  if(!S.history.length){
    html+=`<div class="empty"><div class="empty-icon">\uD83C\uDF4A</div><p>No fasts yet.<br>Complete your first one to start your record!</p></div>`;
  }else{
    html+=`<div class="card"><div class="card-title">Recent fasts</div>`;
    S.history.slice(0,20).forEach(f=>{
      html+=`<div class="fast-row">
        <div><div style="font-size:14px;color:var(--text)">${f.date}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDur(f.duration)}</div></div>
        <span class="badge ${f.completed?'badge-ok':'badge-meh'}">${f.completed?'\u2713 Complete':'Broke early'}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function renderSettingsF(){
  document.getElementById('tab-settings-f').innerHTML=`<div class="col" style="padding-top:10px">
    <div style="font-family:var(--font-d);font-size:22px;font-style:italic;color:var(--peach);padding:0 2px">Settings</div>

    <div class="card">
      <div class="card-title">Protocol</div>
      <div class="form-row">
        <label class="form-label">Fasting hours</label>
        <select id="cfg-hours" onchange="previewProto()" style="width:100%">
          ${[14,16,18,20,22,24].map(h=>`<option value="${h}" ${S.cfg.hours===h?'selected':''}>${h}:${24-h} &mdash; fast ${h}h, eat ${24-h}h</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Default start time</label>
        <div style="display:flex;align-items:center;gap:0">
          <input type="time" id="cfg-start" value="${fmt2(S.cfg.startHour)}:${fmt2(S.cfg.startMin)}" oninput="previewProto()" style="width:auto;flex-shrink:0"/>
        </div>
      </div>
      <div id="proto-prev" style="background:var(--bg2);border-radius:12px;padding:13px 15px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:2.1;border:1px solid var(--border2)"></div>
      <button class="btn" onclick="saveSettings()">Save settings</button>
    </div>

    <div class="card">
      <div class="card-title">\u2195\uFE0F Backup & restore</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.65">Export your fasting history to keep it safe, or import a previous backup to restore it.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn" onclick="exportData()">\u2B06\uFE0F Download backup</button>
        <label style="cursor:pointer">
          <input type="file" accept=".json" id="import-input" style="display:none;width:0" onchange="importData(this)"/>
          <div class="btn-outline" style="text-align:center;padding:11px 20px">\u2B07\uFE0F Import from backup</div>
        </label>
        <div id="import-status" style="font-size:12px;color:var(--text3);font-style:italic;text-align:center;min-height:16px"></div>
      </div>
    </div>

    <div class="card" style="border-color:rgba(255,80,50,0.2)">
      <div class="card-title" style="color:#e05030">\u26A0\uFE0F Danger zone</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">Permanently delete all fasting history. Export a backup first!</p>
      <button class="btn-outline" style="color:#e05030;border-color:rgba(255,80,50,0.25)" onclick="clearHistory()">Clear all history</button>
    </div>

    <div style="text-align:center;padding:12px 0 4px">
      <div style="font-family:var(--font-d);font-size:13px;font-style:italic;color:var(--text3)">\uD83C\uDF4B Nessie's Fast</div>
    </div>
  </div>`;
  previewProto();
}

function previewProto(){
  const h=parseInt(document.getElementById('cfg-hours')?.value||S.cfg.hours);
  const sv=document.getElementById('cfg-start')?.value||`${fmt2(S.cfg.startHour)}:${fmt2(S.cfg.startMin)}`;
  const [sh,sm]=sv.split(':').map(Number);
  const eat=new Date();eat.setHours(sh+h,sm,0,0);
  const stop=new Date();stop.setHours(sh+h+(24-h),sm,0,0);
  const p=document.getElementById('proto-prev');
  if(p)p.innerHTML=`\uD83C\uDF19 Fast starts: <strong style="color:var(--peach)">${fmt2(sh)}:${fmt2(sm)}</strong><br>\uD83C\uDF4A Eat from: <strong style="color:var(--peach)">${eat.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</strong><br>\uD83C\uDF19 Stop eating: <strong style="color:var(--peach)">${stop.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</strong>`;
}

async function saveSettings(){
  S.cfg.hours=parseInt(document.getElementById('cfg-hours').value);
  S.cfg.eatHours=24-S.cfg.hours;
  const [h,m]=document.getElementById('cfg-start').value.split(':').map(Number);
  S.cfg.startHour=h;S.cfg.startMin=m;
  await DB.set('fast_cfg',S.cfg);
  renderAll();toast('Settings saved \u2726');
}

function exportData(){
  const blob=new Blob([JSON.stringify({_exported:new Date().toISOString(),cfg:S.cfg,history:S.history},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`nessies-fast-${todayStr()}.json`;a.click();toast('Backup downloaded \u2726');
}

async function importData(input){
  const file=input.files[0]; if(!file)return;
  const status=document.getElementById('import-status');
  try{
    const data=JSON.parse(await file.text());
    let added=0;
    if(Array.isArray(data.history)){
      const existing=new Set(S.history.map(f=>f.startedAt));
      const newOnes=data.history.filter(f=>!existing.has(f.startedAt));
      S.history=[...S.history,...newOnes].sort((a,b)=>new Date(b.endedAt)-new Date(a.endedAt));
      added=newOnes.length;
      await DB.set('fast_history',S.history);
    }
    if(data.cfg&&!S.active){ S.cfg={...S.cfg,...data.cfg}; await DB.set('fast_cfg',S.cfg); }
    renderAll();
    if(status){status.style.color='var(--mint)';status.textContent=`\u2713 Imported ${added} new fast${added!==1?'s':''}!`;}
    input.value='';
    toast(`Imported ${added} fasts \u2726`);
  }catch(e){
    if(status){status.style.color='#e05030';status.textContent='Could not read file — make sure it\'s a valid backup.';}
  }
}

function clearHistory(){
  confirmDo('All fasting history will be permanently deleted.',async()=>{
    S.history=[];await DB.set('fast_history',[]);renderAll();toast('History cleared \u2726');
  });
}

init();
</script>
</body>
</html>
